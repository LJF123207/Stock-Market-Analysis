<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈列表</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles-index.css') }}">
</head>
<body class="has-nav">
    <header class="top-nav">
        <div class="brand">📈 股票分析系统</div>
        <nav class="nav-links">
            <a href="{{ url_for('index') }}">首页</a>
            <a href="{{ url_for('stock_list') }}">股票列表</a>
            <a href="{{ url_for('tutorial') }}">系统说明</a>
        </nav>
        <div class="nav-actions">
            <a href="{{ url_for('logout') }}" class="ghost-link">退出</a>
        </div>
    </header>

    <div class="container page-block">
        <h1>User Feedback</h1>
        <div class="table-container finance-table-wrap">
            <table class="finance-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Stock</th>
                        <th>Feedback</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    {% for entry in feedback_entries %}
                    <tr>
                        <td>{{ entry[0] }}</td>
                        <td>{{ entry[1] }}</td>
                        <td>{{ entry[2] }}</td>
                        <td>{{ entry[3] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
