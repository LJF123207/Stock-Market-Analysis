<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统说明</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles-index.css') }}">
</head>
<body class="has-nav">
    <header class="top-nav">
        <div class="brand">📈 股票分析系统</div>
        <nav class="nav-links">
            <a href="{{ url_for('index') }}">首页</a>
            <a href="{{ url_for('stock_list') }}">股票列表</a>
            <a href="{{ url_for('tutorial') }}">系统说明</a>
        </nav>
        <div class="nav-actions">
            {% if session.get('username') %}
            <a href="{{ url_for('logout') }}" class="ghost-link">退出</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="ghost-link">登录</a>
            {% endif %}
        </div>
    </header>

    <div class="container page-block">
        <h2>系统说明</h2>
        <p>当前系统不再使用 Yahoo 数据抓取和价格预测模型，分析全部基于本地数据目录。</p>

        <ul>
            <li>数据来源：`IndexAndNews0928-0604` 本地 `.pqt` 文件。</li>
            <li>股票列表：支持按代码和名称搜索。</li>
            <li>历史数据：显示最新 60 天开盘、收盘、成交量、成交额、最高价、最低价。</li>
            <li>技术因子：显示最新 60 天 MACD、KDJ、BOLL、CCI 指标。</li>
        </ul>
    </div>
</body>
</html>
